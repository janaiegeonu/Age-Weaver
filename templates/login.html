<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age-Weaver/Login</title>

  
<link rel="stylesheet" href="/static/css/login.css?v=1.0.1"></head>
<body>
 <div class="container">
     <h1 class="heading"> Welcome!</h1>

        <div class="login-module">

            <div class="card">
                <p class="signin"> Login</p> 
              <form action="/login" method="post">                   
                  <label><i>Email</i> </label>
                    <div class="input-wrapper">
                    <input type="email" name = "email" placeholder="Enter email" required >
                    <img class="svg" src="/static/SVG/email.svg" alt="User icon">


                    </div>
                    
                    <br><br>
                   <label><i>Password</i></label>                       
                    <div class="input-wrapper">                     
                    <button type="button" id="toggle-password" class="toggle-btn" aria-label="Show password">
                    <!-- Open Eye SVG (Hidden by default) -->
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-open" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <!-- Closed Eye SVG (Visible by default) -->
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-closed">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                    </button>
                    <input type="password" name="pwd" id="password-input" placeholder="Enter Password" required>                     
                    </div>


                    <br><br>
                    <hr>
                    <button  class="subbutton" type="submit"> Login</button>
                     <button  class="resbutton" type="reset"> reset</button>
                     
                     <p class="footertxt"> Don't have an Account? <a class="footerlink" href="/"> Sign Up </a></p>

                    
                </form>
            </div>
            <div class="cardimg">              
                <p class="imgtxt"> Age-Weaver</p>
              
                <p class="imgtxtsub"><em> know your exact Age..</em> </p>
            </div> 
        </div>
    </div> 
    <script>
    const passwordInput = document.getElementById('password-input');
const togglePasswordButton = document.getElementById('toggle-password');
const eyeOpenIcon = togglePasswordButton.querySelector('.eye-open');
const eyeClosedIcon = togglePasswordButton.querySelector('.eye-closed');

// Start with the closed eye visible because the password starts hidden
eyeOpenIcon.style.display = 'none';
eyeClosedIcon.style.display = 'block';

togglePasswordButton.addEventListener('click', () => {
  const isPassword = passwordInput.getAttribute('type') === 'password';
  
  if (isPassword) {
    // Reveal password -> Show open eye
    passwordInput.setAttribute('type', 'text');
    eyeOpenIcon.style.display = 'block';
    eyeClosedIcon.style.display = 'none';
    togglePasswordButton.setAttribute('aria-label', 'Hide password');
  } else {
    // Hide password -> Show closed eye
    passwordInput.setAttribute('type', 'password');
    eyeOpenIcon.style.display = 'none';
    eyeClosedIcon.style.display = 'block';
    togglePasswordButton.setAttribute('aria-label', 'Show password');
  }
});


  </script>

</body>
