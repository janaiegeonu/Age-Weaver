<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age-Weaver/sign up</title>

  
<link rel="stylesheet" href="/static/css/signIn.css?v=1.1"></head>
<body>      
    <div class="container">
     <h1 class="heading"> Welcome!</h1>

        <div class="login-module">

            <div class="card">
                <p class="signin"> Sign up</p> 
             <form action="/auth/register" method="post">
                    <label><i>Name</i></label>
                    <div class="input-wrapper">
                        <input name="username" type="text" id="name" placeholder="Enter name" {{if .Username}} value="{{.Username}}" {{end}} required> 
                        <img class="svg" src="/static/SVG/user.svg" alt="User icon">
                    
                    </div>
                     <p class="error toast-message "> {{.UsernameError}}</p>
                    <br>
                     <label><i>Phone</i> </label>
                     <div class="input-wrapper">
                     <input name="phone" type="text" id = "phone" placeholder="Enter phone number" {{if .Phone}} value="{{.Phone}}" {{end}} required>
                    <img class="svg" src="/static/SVG/phone.svg" alt="User icon">

                    
                     </div>
                      <p class="error toast-message ">{{.PhoneError}}</p>
                    <br>
                    <label><i>Email</i> </label>
                    <div class="input-wrapper">
                    <input name="email" type="email" id = "email" placeholder="Enter email" {{if .Email}} value="{{.Email}}" {{end}} required >
                    <img class="svg" src="/static/SVG/email.svg" alt="User icon">


                    </div>
                    <p class="error toast-message ">{{.EmailError}}</p>
                    
                    <br>
                     <label><i>Password</i></label>                       
                    <div class="input-wrapper">                     
                    <button type="button" id="toggle-password" class="toggle-btn" aria-label="Show password">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-open" style="display: none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-closed">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                        <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                    </button>
                    <input type="password" name="pwd" id="password-input" placeholder="Enter Password" required>                     
                    </div>


                     <p class="error toast-message ">{{.PasswordError}}</p>
                    <br><br>
                    <hr>
                    <button  class="subbutton" type="submit"> Create Account</button>
                     <button  class="resbutton" type="reset" id="resetBtn"> reset</button>
                     
                     <p class="footertxt"> Already have an account? <a class="footerlink" href="/login"> Login </a></p>

                    
                </form>
            </div>
            <div class="cardimg">              
                <p class="imgtxt"> Age-Weaver</p>
              
                <p class="imgtxtsub"><em> know your exact Age..</em> </p>
            </div> 
        </div>
    </div> 

     <script>
    const passwordInput = document.getElementById('password-input');
const togglePasswordButton = document.getElementById('toggle-password');
const eyeOpenIcon = togglePasswordButton.querySelector('.eye-open');
const eyeClosedIcon = togglePasswordButton.querySelector('.eye-closed');

eyeOpenIcon.style.display = 'none';
eyeClosedIcon.style.display = 'block';

togglePasswordButton.addEventListener('click', () => {
  const isPassword = passwordInput.getAttribute('type') === 'password';
  
  if (isPassword) {
    passwordInput.setAttribute('type', 'text');
    eyeOpenIcon.style.display = 'block';
    eyeClosedIcon.style.display = 'none';
    togglePasswordButton.setAttribute('aria-label', 'Hide password');
  } else {
    passwordInput.setAttribute('type', 'password');
    eyeOpenIcon.style.display = 'none';
    eyeClosedIcon.style.display = 'block';
    togglePasswordButton.setAttribute('aria-label', 'Show password');
  }
});


  </script>

  <script>
document.querySelector('form').addEventListener('reset', function(event) {
  event.preventDefault();
  
  const inputs = this.querySelectorAll('input');
  inputs.forEach(input => {
    input.value = ''; 
    input.removeAttribute('value'); 
  });

  const errorParagraphs = this.querySelectorAll('.error.toast-message');
  errorParagraphs.forEach(p => {
    p.textContent = '';
  });
});

</script>


</body>


</html>
